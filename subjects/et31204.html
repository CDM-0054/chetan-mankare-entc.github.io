<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electrical Circuits — Chetan Mankare</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  
  <!-- ════════════════════════════════════════════ -->
  <!-- ALL CSS INCLUDED HERE - NO EXTERNAL FILE NEEDED -->
  <!-- ════════════════════════════════════════════ -->
  <style>
    /* ─── CSS VARIABLES ─── */
    :root {
      --bg: #050810;
      --bg2: #090d1a;
      --panel: #0d1224;
      --border: #1a2540;
      --neon: #00f5c4;
      --neon2: #7b2fff;
      --neon3: #ff3a6e;
      --amber: #ffb300;
      --text: #c8d8f0;
      --muted: #4a5f80;
      --font-hd: 'Orbitron', monospace;
      --font-ui: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }

    /* ─── RESET & BASE ─── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 16px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ─── STARFIELD ─── */
    #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ─── LAYOUT ─── */
    .wrapper { position: relative; z-index: 2; padding: 0 16px; min-height: 100vh; display: flex; flex-direction: column; }
    .subject-page { padding-top: 100px; max-width: 900px; margin: 0 auto; padding-left: 32px; padding-right: 32px; }

    /* ─── NAVIGATION ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: rgba(5,8,16,.95);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: var(--font-hd); font-size: 0.7rem; color: var(--neon); letter-spacing: .12em; text-decoration: none; }
    .nav-links { display: flex; gap: 12px; list-style: none; align-items: center; }
    .nav-links a { font-family: var(--font-mono); font-size: 0.6rem; color: var(--muted); text-decoration: none; letter-spacing: .08em; text-transform: uppercase; transition: color .2s; white-space: nowrap; }
    .nav-links a:hover { color: var(--neon); }
    @media (min-width: 768px) {
      nav { padding: 18px 48px; }
      .nav-logo { font-size: .85rem; letter-spacing: .18em; }
      .nav-links { gap: 36px; }
      .nav-links a { font-size: .78rem; letter-spacing: .12em; }
    }

    /* ─── BACK LINK ─── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--neon);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      margin-bottom: 32px;
      transition: all 0.3s ease;
    }
    .back-link:hover { transform: translateX(-5px); opacity: 0.7; }

    /* ─── SUBJECT HEADER ─── */
    .subject-header {
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }
    .subject-header .code {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: .08em;
    }
    .subject-header h1 {
      font-family: var(--font-hd);
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      color: #fff;
      margin: 8px 0;
    }
    .subject-header .progress-big {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 12px;
    }
    .subject-header .progress-big .bar-big {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .subject-header .progress-big .bar-big .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon), var(--neon2));
      border-radius: 4px;
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }
    .subject-header .progress-big .pct {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--neon);
      font-weight: 600;
      min-width: 48px;
      text-align: right;
    }

    /* ─── CHAPTER ACCORDION ─── */
    .chapter-accordion {
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      background: rgba(13, 18, 36, 0.3);
      transition: all 0.3s ease;
    }
    .chapter-accordion:hover { border-color: rgba(0, 245, 196, 0.2); }

    .chapter-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      cursor: pointer;
      transition: background 0.3s;
      user-select: none;
    }
    .chapter-header:hover { background: rgba(0, 245, 196, 0.03); }

    .chapter-header .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      flex-shrink: 0;
    }
    .chapter-header .checkbox.done {
      background: var(--neon);
      border-color: var(--neon);
    }
    .chapter-header .checkbox.done::after {
      content: '✓';
      color: var(--bg);
      font-size: 14px;
      font-weight: 700;
    }

    .chapter-header .num {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      min-width: 24px;
    }
    .chapter-header .title {
      font-family: var(--font-ui);
      font-size: 0.95rem;
      color: var(--text);
      flex: 1;
      font-weight: 500;
    }
    .chapter-header .title.done {
      color: var(--muted);
      text-decoration: line-through;
    }

    .chapter-header .status-badge {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.03);
      padding: 2px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .chapter-header .status-badge.done {
      color: var(--neon);
      border-color: rgba(0, 245, 196, 0.3);
    }

    .chapter-header .arrow {
      font-size: 1.2rem;
      color: var(--muted);
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }
    .chapter-header .arrow.open { transform: rotate(180deg); }

    .chapter-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .chapter-content.open { max-height: 1200px; }

    .chapter-content-inner {
      padding: 0 20px 20px 20px;
      border-top: 1px solid var(--border);
    }

    /* ─── PDF SECTION ─── */
    .pdf-section {
      margin-top: 16px;
      padding: 14px 16px;
      background: rgba(13, 18, 36, 0.3);
      border-radius: 8px;
      border: 1px solid rgba(26, 37, 64, 0.3);
    }
    .pdf-section .label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: .08em;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .pdf-section .pdf-url {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      word-break: break-all;
      padding: 6px 10px;
      background: rgba(5, 8, 16, 0.3);
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .pdf-section .pdf-url a { color: var(--neon); text-decoration: none; }
    .pdf-section .pdf-url a:hover { text-decoration: underline; }
    .pdf-download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 245, 196, 0.1);
      border: 1px solid rgba(0, 245, 196, 0.2);
      color: var(--neon);
      padding: 6px 16px;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }
    .pdf-download-btn:hover {
      background: rgba(0, 245, 196, 0.2);
      transform: translateY(-2px);
    }

    /* ─── CODE SECTION ─── */
    .code-section {
      margin-top: 16px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(26, 37, 64, 0.3);
    }
    .code-header {
      background: rgba(5, 8, 16, 0.5);
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(26, 37, 64, 0.3);
    }
    .code-header .lang {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
    }
    .code-header .copy-btn {
      background: rgba(0, 245, 196, 0.1);
      border: 1px solid rgba(0, 245, 196, 0.2);
      color: var(--neon);
      padding: 3px 12px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .code-header .copy-btn:hover { background: rgba(0, 245, 196, 0.2); }
    .code-body {
      padding: 16px;
      background: rgba(5, 8, 16, 0.5);
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ─── NOTES SECTION ─── */
    .notes-section {
      margin-top: 16px;
      padding: 14px 16px;
      background: rgba(13, 18, 36, 0.3);
      border-radius: 8px;
      border: 1px solid rgba(26, 37, 64, 0.3);
    }
    .notes-section .label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: .08em;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .notes-section .notes-textarea {
      width: 100%;
      min-height: 80px;
      background: rgba(5, 8, 16, 0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 0.85rem;
      padding: 10px 12px;
      resize: vertical;
      transition: border-color 0.3s;
    }
    .notes-section .notes-textarea:focus {
      border-color: var(--neon);
      outline: none;
    }
    .notes-section .notes-textarea:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .notes-section .notes-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .notes-section .notes-actions button {
      background: rgba(0, 245, 196, 0.1);
      border: 1px solid rgba(0, 245, 196, 0.2);
      color: var(--neon);
      padding: 4px 14px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .notes-section .notes-actions button:hover { background: rgba(0, 245, 196, 0.2); }
    .notes-section .notes-actions .save-notes {
      background: var(--neon);
      color: var(--bg);
    }
    .notes-section .notes-actions .save-notes:hover {
      box-shadow: 0 0 20px rgba(0, 245, 196, 0.3);
    }
    .notes-section .notes-status {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      color: var(--muted);
      margin-top: 6px;
      min-height: 16px;
    }

    /* ─── RESET BUTTON ─── */
    .reset-btn {
      background: rgba(255,58,110,0.15);
      border: 1px solid rgba(255,58,110,0.3);
      color: var(--neon3);
      padding: 8px 20px;
      border-radius: 20px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 16px;
    }
    .reset-btn:hover { background: rgba(255,58,110,0.25); transform: scale(1.02); }

    /* ─── ADMIN BADGE ─── */
    .admin-badge-subject {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 999;
      background: rgba(13,18,36,0.9);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .admin-badge-subject:hover { border-color: var(--neon); }
    .admin-badge-subject .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon3);
    }
    .admin-badge-subject .dot.active {
      background: var(--neon);
      box-shadow: 0 0 12px var(--neon);
    }

    /* ─── PROGRESS BAR ─── */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--neon), var(--neon2));
      z-index: 1000;
      transition: width 0.1s;
      width: 0%;
      box-shadow: 0 0 20px var(--neon);
    }

    /* ─── BACK TO TOP ─── */
    #backToTop {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      display: none;
      padding: 10px 14px;
      background: var(--neon);
      color: var(--bg);
      border: none;
      border-radius: 50%;
      font-family: var(--font-mono);
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0,245,196,.4);
      transition: all .3s ease;
      min-height: 48px; min-width: 48px;
      align-items: center; justify-content: center;
    }
    #backToTop:hover { box-shadow: 0 0 30px rgba(0,245,196,.6); transform: translateY(-3px) scale(1.05); }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 2;
      text-align: center;
      margin-top: auto;
    }
    @media (min-width: 768px) {
      footer { padding: 28px 48px; flex-direction: row; justify-content: space-between; gap: 0; text-align: left; }
    }
    footer span { font-family: var(--font-mono); font-size: 0.6rem; color: var(--muted); letter-spacing: .06em; }
    @media (min-width: 768px) { footer span { font-size: .72rem; letter-spacing: .08em; } }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .subject-page { padding-left: 16px; padding-right: 16px; padding-top: 80px; }
      .chapter-header { padding: 12px 14px; flex-wrap: wrap; }
      .chapter-header .title { font-size: 0.8rem; order: 3; flex-basis: 100%; margin-left: 38px; }
      .chapter-header .checkbox { width: 18px; height: 18px; }
      .chapter-header .checkbox.done::after { font-size: 11px; }
      .chapter-content-inner { padding: 0 14px 14px 14px; }
      .code-body { font-size: 0.65rem; padding: 12px; }
      .pdf-section .pdf-url { font-size: 0.6rem; }
      .admin-badge-subject { bottom: 80px; left: 10px; font-size: 0.5rem; padding: 6px 12px; }
    }
  </style>
</head>

  <div class="progress-bar"></div>

  <div class="wrapper">

    <!-- NAVIGATION -->
    <nav>
      <a href="../index.html" class="nav-logo">// CHETAN_ENTC</a>
      <ul class="nav-links">
        <li><a href="../index.html#about">About</a></li>
        <li><a href="../index.html#skills">Skills</a></li>
        <li><a href="../index.html#subjects">Subjects</a></li>
        <li><a href="../index.html#projects">Projects</a></li>
        <li><a href="../index.html#experience">Journey</a></li>
        <li><a href="../index.html#contact">Contact</a></li>
      </ul>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="subject-page">
      <a href="../index.html#subjects" class="back-link">← Back to Subjects</a>
      
      <div class="subject-header">
        <span class="code">ET31201</span>
        <h1>Electrical Circuits and Networks</h1>
        <div class="progress-big">
          <span style="font-family:var(--font-mono);font-size:0.7rem;color:var(--muted);">Progress</span>
          <div class="bar-big"><div class="fill" id="progressFill"></div></div>
          <span class="pct" id="progressPct">0%</span>
        </div>
      </div>

      <div class="chapter-list" id="chapterList">
        <!-- Generated by JavaScript -->
      </div>

      <button class="reset-btn" onclick="resetSubject()">Reset This Subject</button>
    </div>

    <!-- FOOTER -->
    <footer>
      <span>© <span class="current-year">2026</span> Chetan Mankare — ENTC Diploma</span>
      <span>🚀 Never Stop Learning</span>
    </footer>
  </div>

  <button id="backToTop" aria-label="Back to top">↑</button>

  <script>
    // ─── SUBJECT DATA ───
    const subjectCode = 'ET31201';
    const subjectName = 'Electrical Circuits and Networks';
    const chapters = [
      { title: 'Laws and Definition', pdf: 'https://drive.google.com/file/d/PLACEHOLDER/view', code: `// Kirchhoff's Current Law (KCL)\n// Sum of currents entering = Sum leaving\nint calculateCurrent(int voltage, int resistance) {\n    return voltage / resistance;\n}`, lang: 'cpp' },
      { title: 'Mesh and Nodal Analysis', pdf: 'https://drive.google.com/file/d/PLACEHOLDER/view', code: `// Mesh Analysis\nint meshCurrent1 = 0, meshCurrent2 = 0;\nfor(int i=0; i<10; i++) {\n    meshCurrent1 += voltage / resistance;\n}`, lang: 'cpp' },
      { title: 'Network Theorems', pdf: 'https://drive.google.com/file/d/PLACEHOLDER/view', code: `// Thevenin's Theorem\nint theveninVoltage = openCircuitVoltage;\nint theveninResistance = equivalentResistance;`, lang: 'cpp' },
      { title: 'Two Port Network', pdf: 'https://drive.google.com/file/d/PLACEHOLDER/view', code: `// Z Parameters\nint z11 = 10, z12 = 5;\nint z21 = 5, z22 = 10;`, lang: 'cpp' },
      { title: 'Resonant Circuit', pdf: 'https://drive.google.com/file/d/PLACEHOLDER/view', code: `// Resonant Frequency\nfloat resonantFrequency(float L, float C) {\n    return 1 / (2 * 3.14159 * sqrt(L * C));\n}`, lang: 'cpp' },
      { title: 'Filter and Attenuator', pdf: 'https://drive.google.com/file/d/PLACEHOLDER/view', code: `// Low Pass Filter\nfloat cutoffFrequency(float R, float C) {\n    return 1 / (2 * 3.14159 * R * C);\n}`, lang: 'cpp' }
    ];

    const API_URL = 'https://sheetdb.io/api/v1/0qetabo87bu71';
    const ADMIN_PASSWORD = 'chetan123';
    let isAdmin = localStorage.getItem('isAdmin') === 'true';

    // ─── GET PROGRESS ───
    async function getProgress() {
      try {
        const response = await fetch(`${API_URL}?sheet=Sheet1`);
        const data = await response.json();
        const progress = { status: chapters.map(() => false), notes: {} };
        if (data && data.length > 0) {
          data.forEach(row => {
            if (row.SubjectCode === subjectCode) {
              const index = parseInt(row.ChapterIndex);
              if (index < progress.status.length) {
                progress.status[index] = row.Status === 'TRUE' || row.Status === 'true';
              }
              if (row.Notes) {
                progress.notes[index] = row.Notes;
              }
            }
          });
        }
        return progress;
      } catch {
        const local = localStorage.getItem('subjectProgress');
        const all = local ? JSON.parse(local) : {};
        return all[subjectCode] || { status: chapters.map(() => false), notes: {} };
      }
    }

    // ─── SAVE PROGRESS ───
    async function saveProgress(progress) {
      const local = localStorage.getItem('subjectProgress');
      const all = local ? JSON.parse(local) : {};
      all[subjectCode] = progress;
      localStorage.setItem('subjectProgress', JSON.stringify(all));
      try {
        await fetch(API_URL, { method: 'DELETE' });
        const records = progress.status.map((status, index) => ({
          SubjectCode: subjectCode,
          ChapterIndex: index,
          Status: status ? 'TRUE' : 'FALSE',
          Notes: progress.notes && progress.notes[index] ? progress.notes[index] : ''
        }));
        await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(records)
        });
      } catch(e) {}
    }

    // ─── RENDER ───
    async function render() {
      const progress = await getProgress();
      const status = progress.status || chapters.map(() => false);
      const notes = progress.notes || {};
      const done = status.filter(Boolean).length;
      const total = chapters.length;
      const pct = Math.round((done / total) * 100);

      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressPct').textContent = pct + '%';

      const list = document.getElementById('chapterList');
      list.innerHTML = chapters.map((chapter, index) => `
        <div class="chapter-accordion">
          <div class="chapter-header" onclick="toggleChapter(${index})">
            <div class="checkbox ${status[index] ? 'done' : ''}" onclick="event.stopPropagation(); toggleStatus(${index})"></div>
            <span class="num">${String(index + 1).padStart(2, '0')}</span>
            <span class="title ${status[index] ? 'done' : ''}">${chapter.title}</span>
            <span class="status-badge ${status[index] ? 'done' : ''}">${status[index] ? '✓ Done' : '⬜ Pending'}</span>
            <span class="arrow" id="arrow-${index}">▾</span>
          </div>
          <div class="chapter-content" id="content-${index}">
            <div class="chapter-content-inner">
              <div class="pdf-section">
                <div class="label">📄 PDF Notes</div>
                <div class="pdf-url"><a href="${chapter.pdf}" target="_blank">${chapter.pdf}</a></div>
                <a href="${chapter.pdf}" target="_blank" class="pdf-download-btn">📥 Download PDF</a>
              </div>
              <div class="code-section">
                <div class="code-header">
                  <span class="lang">💻 ${chapter.lang || 'code'}</span>
                  <button class="copy-btn" onclick="copyCode(this)">📋 Copy Code</button>
                </div>
                <div class="code-body">${chapter.code}</div>
              </div>
              <div class="notes-section">
                <div class="label">📝 My Notes</div>
                <textarea class="notes-textarea" id="notes-${index}" ${!isAdmin ? 'disabled' : ''} placeholder="Add your personal notes here...">${notes[index] || ''}</textarea>
                ${isAdmin ? `
                <div class="notes-actions"><button class="save-notes" onclick="saveNote(${index})">💾 Save Notes</button></div>
                <div class="notes-status" id="notes-status-${index}"></div>
                ` : `
                <div style="font-family:var(--font-mono);font-size:0.55rem;color:var(--muted);margin-top:6px;">🔒 Admin only can edit notes</div>
                `}
              </div>
            </div>
          </div>
        </div>
      `).join('');
      
      if (!isAdmin) {
        document.querySelectorAll('.chapter-header .checkbox').forEach(el => { el.style.cursor = 'default'; });
      }
    }

    // ─── TOGGLE CHAPTER ───
    function toggleChapter(index) {
      const content = document.getElementById(`content-${index}`);
      const arrow = document.getElementById(`arrow-${index}`);
      content.classList.toggle('open');
      arrow.classList.toggle('open');
    }

    // ─── TOGGLE STATUS ───
    async function toggleStatus(index) {
      if (!isAdmin) return;
      const progress = await getProgress();
      if (!progress.status) progress.status = chapters.map(() => false);
      progress.status[index] = !progress.status[index];
      await saveProgress(progress);
      await render();
    }

    // ─── SAVE NOTE ───
    async function saveNote(index) {
      if (!isAdmin) return;
      const textarea = document.getElementById(`notes-${index}`);
      const statusEl = document.getElementById(`notes-status-${index}`);
      const progress = await getProgress();
      if (!progress.notes) progress.notes = {};
      progress.notes[index] = textarea.value;
      await saveProgress(progress);
      statusEl.textContent = '✅ Notes saved!';
      statusEl.style.color = 'var(--neon)';
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
    }

    // ─── RESET ───
    async function resetSubject() {
      if (!isAdmin) return;
      if (confirm(`Reset all progress for ${subjectName}?`)) {
        const progress = await getProgress();
        progress.status = chapters.map(() => false);
        await saveProgress(progress);
        await render();
      }
    }

    // ─── ADMIN BADGE ───
    function toggleAdmin() {
      if (isAdmin) {
        if (confirm('Logout from admin mode?')) {
          isAdmin = false;
          localStorage.setItem('isAdmin', 'false');
          render();
          document.querySelector('.admin-badge-subject .dot').classList.remove('active');
          document.querySelector('.admin-badge-subject .status').textContent = 'View Only';
        }
      } else {
        const pw = prompt('Enter admin password:');
        if (pw === ADMIN_PASSWORD) {
          isAdmin = true;
          localStorage.setItem('isAdmin', 'true');
          render();
          document.querySelector('.admin-badge-subject .dot').classList.add('active');
          document.querySelector('.admin-badge-subject .status').textContent = 'Admin Mode';
        } else if (pw !== null) {
          alert('❌ Incorrect password');
        }
      }
    }

    function addAdminBadge() {
      const badge = document.createElement('div');
      badge.className = 'admin-badge-subject';
      badge.onclick = toggleAdmin;
      badge.innerHTML = `
        <span class="dot ${isAdmin ? 'active' : ''}"></span>
        <span class="status">${isAdmin ? 'Admin Mode' : 'View Only'}</span>
        <span style="font-size:0.5rem;opacity:0.5;">${isAdmin ? '🔓' : '🔒'}</span>
      `;
      document.body.appendChild(badge);
    }

    // ─── COPY CODE ───
    function copyCode(button) {
      const codeBlock = button.closest('.code-section').querySelector('.code-body');
      const text = codeBlock.textContent;
      navigator.clipboard.writeText(text).then(() => {
        const original = button.textContent;
        button.textContent = '✅ Copied!';
        setTimeout(() => button.textContent = original, 2000);
      });
    }

    // ─── STARFIELD ───
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    for (let i = 0; i < 180; i++) {
      stars.push({ x: Math.random() * 2000, y: Math.random() * 2000, r: Math.random() * 1.2 + .3, a: Math.random(), s: Math.random() * .3 + .05 });
    }
    function drawStars() {
      ctx.clearRect(0, 0, W, H);
      stars.forEach(s => {
        s.a += s.s * .005;
        const alpha = .3 + .5 * Math.abs(Math.sin(s.a));
        ctx.beginPath();
        ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 220, 255, ${alpha})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();

    // ─── SCROLL LISTENERS ───
    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progressBar = document.querySelector('.progress-bar');
      if (progressBar) progressBar.style.width = ((scrollTop / docHeight) * 100) + '%';
    });

    const backButton = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      backButton.style.display = window.scrollY > 400 ? 'flex' : 'none';
    });
    backButton.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });

    document.querySelector('.current-year').textContent = new Date().getFullYear();

    // ─── INIT ───
    addAdminBadge();
    render();
    console.log(`📚 ${subjectName} loaded!`);
  </script>

</body>
</html>
